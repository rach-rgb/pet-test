<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="고양이 성격과 취향으로 알아보는 재미 진단 모음">
    <meta property="og:title" content="고양이 진단 연구소">
    <meta property="og:description" content="고양이 MBTI와 고양이 전생 테스트를 즐겨보세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/cat-mascot.png">
    <title>고양이 진단 연구소</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <nav class="site-nav" aria-label="주요 메뉴">
        <button class="nav-home-button" id="home-button" type="button">홈</button>
      </nav>

      <section class="home-view" id="home-view">
        <div class="home-copy">
          <p class="eyebrow">Cat Test Lab</p>
          <h1>고양이 진단 연구소</h1>
          <p class="lead">우리 고양이의 습성, 성격, 취향을 골라 재미있는 결과를 확인해보세요.</p>
        </div>

        <div class="test-menu" aria-label="진단 선택">
          <article class="test-card">
            <div>
              <p class="eyebrow">Cat Habit Type</p>
              <h2>우리 고양이 MBTI</h2>
              <p>평소 습성을 고르면 성향 코드와 집사 맞춤 해석을 보여드려요.</p>
            </div>
            <button class="primary-button" type="button" data-start-test="mbti">테스트 시작</button>
          </article>

          <article class="test-card">
            <div>
              <p class="eyebrow">Past Life Match</p>
              <h2>고양이 전생 테스트</h2>
              <p>성격과 기호를 바탕으로 우리 고양이의 전생 모습을 찾아드려요.</p>
            </div>
            <button class="primary-button" type="button" data-start-test="past-life">전생 알아보기</button>
          </article>
        </div>
      </section>

      <section class="hero is-hidden" id="intro-view">
        <div class="hero-copy">
          <p class="eyebrow" id="intro-eyebrow"></p>
          <h1 id="intro-title"></h1>
          <p class="lead" id="intro-lead"></p>
          <button class="primary-button" id="start-button" type="button">테스트 시작</button>
        </div>
        <div class="hero-art" aria-hidden="true">
          <img src="assets/cat-mascot.png" alt="">
        </div>
      </section>

      <section class="quiz-panel is-hidden" id="quiz-view" aria-live="polite">
        <div class="progress-row">
          <span id="progress-label">1 / 10</span>
          <div class="progress-track">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <h2 id="question-title"></h2>
        <div class="choice-grid" id="choice-grid"></div>
      </section>

      <section class="result-view is-hidden" id="result-view">
        <div class="result-card" id="result-card">
          <div class="result-image-frame" id="result-image-frame">
            <img class="result-image" id="result-image" src="assets/cat-mascot.png" alt="고양이 일러스트">
          </div>
          <div class="result-copy">
            <p class="eyebrow" id="result-eyebrow">Result</p>
            <h2 id="result-type"></h2>
            <h3 id="result-title"></h3>
            <p id="result-description"></p>
            <ul class="trait-list" id="trait-list"></ul>
          </div>
        </div>

        <div class="cat-selector" aria-labelledby="cat-selector-title">
          <p class="cat-selector-title" id="cat-selector-title">고양이 이미지 선택</p>
          <div class="cat-option-grid" id="cat-option-grid"></div>
        </div>

        <div class="action-row">
          <button class="primary-button" id="copy-link-button" type="button">결과 링크 복사</button>
          <button class="secondary-button" id="share-image-button" type="button">이미지 공유</button>
          <button class="secondary-button" id="download-image-button" type="button">이미지 저장</button>
          <button class="text-button" id="restart-button" type="button">다시 하기</button>
        </div>
        <p class="share-note" id="share-note" role="status"></p>
      </section>
    </main>

    <canvas id="share-canvas" width="1200" height="1200" aria-hidden="true"></canvas>
    <script src="script.js"></script>
  </body>
</html>
